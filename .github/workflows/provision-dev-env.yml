name: Provision Dev Environment

on:
  workflow_dispatch:
    inputs:
      environment_name:
        description: Name for the dev environment
        required: true
      base_branch:
        description: Git branch to deploy
        required: true
        default: main
      ttl:
        description: Time-to-live (e.g. 4h, 8h, 24h)
        required: true
        default: 8h
      cluster:
        description: Target cluster
        required: true
      include_seed_data:
        description: Include seed data
        required: false
        default: "false"
      service_id:
        description: Port service entity identifier
        required: true
      service_name:
        description: Port service entity name
        required: true
      port_run_id:
        description: Port action run ID
        required: true

jobs:
  provision:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Report in-progress to Port
        run: |
          TOKEN=$(curl -s -X POST https://api.port.io/v1/auth/access_token \
            -H "Content-Type: application/json" \
            -d '{"clientId":"${{ secrets.PORT_CLIENT_ID }}","clientSecret":"${{ secrets.PORT_CLIENT_SECRET }}"}' \
            | jq -r '.accessToken')
          curl -s -X PATCH "https://api.port.io/v1/actions/runs/${{ inputs.port_run_id }}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status":"IN_PROGRESS","message":{"run_status":"Provisioning ${{ inputs.environment_name }} on GCP..."}}'

      - name: Terraform Init
        working-directory: terraform/dev-env
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/dev-env
        env:
          TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_port_client_id: ${{ secrets.PORT_CLIENT_ID }}
          TF_VAR_port_client_secret: ${{ secrets.PORT_CLIENT_SECRET }}
          TF_VAR_environment_name: ${{ inputs.environment_name }}
          TF_VAR_service_id: ${{ inputs.service_id }}
          TF_VAR_base_branch: ${{ inputs.base_branch }}
          TF_VAR_ttl: ${{ inputs.ttl }}
        run: terraform apply -auto-approve

      - name: Report success to Port
        if: success()
        run: |
          TOKEN=$(curl -s -X POST https://api.port.io/v1/auth/access_token \
            -H "Content-Type: application/json" \
            -d '{"clientId":"${{ secrets.PORT_CLIENT_ID }}","clientSecret":"${{ secrets.PORT_CLIENT_SECRET }}"}' \
            | jq -r '.accessToken')
          curl -s -X PATCH "https://api.port.io/v1/actions/runs/${{ inputs.port_run_id }}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status":"SUCCESS","message":{"run_status":"Environment ${{ inputs.environment_name }} is live on GCP. TTL: ${{ inputs.ttl }}"}}'

      - name: Report failure to Port
        if: failure()
        run: |
          TOKEN=$(curl -s -X POST https://api.port.io/v1/auth/access_token \
            -H "Content-Type: application/json" \
            -d '{"clientId":"${{ secrets.PORT_CLIENT_ID }}","clientSecret":"${{ secrets.PORT_CLIENT_SECRET }}"}' \
            | jq -r '.accessToken')
          curl -s -X PATCH "https://api.port.io/v1/actions/runs/${{ inputs.port_run_id }}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status":"FAILURE","message":{"run_status":"Failed to provision ${{ inputs.environment_name }}"}}'
